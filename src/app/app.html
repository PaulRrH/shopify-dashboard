<div class="min-h-screen bg-white">

  <!-- Announcement Bar -->
  @if (showAnnouncement()) {
    <div class="bg-black text-white text-xs sm:text-sm py-3 px-4 text-center relative">
      <p>
        Sign up and get 20% off to your first order.
        <a href="#" class="font-bold underline ml-1">Sign Up Now</a>
      </p>
      <button
        (click)="dismissAnnouncement()"
        class="absolute right-4 top-1/2 -translate-y-1/2 text-white opacity-60 hover:opacity-100 transition-opacity">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }

  <!-- Navbar -->
  <nav class="px-4 sm:px-8 lg:px-16 py-5 flex items-center gap-6 lg:gap-10 border-b border-gray-100">

    <!-- Logo -->
    <a href="#" class="text-xl lg:text-2xl font-black tracking-tighter text-black shrink-0 select-none">
      SHOP.CO
    </a>

    <!-- Nav Links -->
    <div class="hidden lg:flex items-center gap-8 flex-1">
      <a href="#" class="flex items-center gap-1 text-sm font-medium text-gray-800 hover:text-black transition-colors">
        Shop
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </a>
      <a href="#" class="text-sm font-medium text-gray-800 hover:text-black transition-colors">On Sale</a>
      <a href="#" class="text-sm font-medium text-gray-800 hover:text-black transition-colors">New Arrivals</a>
      <a href="#" class="text-sm font-medium text-gray-800 hover:text-black transition-colors">Brands</a>
    </div>

    <!-- Search Bar -->
    <div class="flex-1 lg:flex-none relative">
      <svg class="w-4 h-4 text-gray-400 absolute left-3.5 top-1/2 -translate-y-1/2 pointer-events-none"
        fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input
        type="text"
        placeholder="Search for products..."
        class="w-full lg:w-60 xl:w-80 pl-10 pr-4 py-2.5 bg-gray-100 rounded-full text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-black/10 transition-all" />
    </div>

    <!-- Icons -->
    <div class="flex items-center gap-2">
      <!-- Cart -->
      <button class="p-2 hover:bg-gray-100 rounded-full transition-colors relative">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        @if (cartCount() > 0) {
          <span class="absolute -top-0.5 -right-0.5 bg-black text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center leading-none">
            {{ cartCount() }}
          </span>
        }
      </button>
      <!-- User -->
      <button class="p-2 hover:bg-gray-100 rounded-full transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </button>
      <!-- Mobile menu -->
      <button class="lg:hidden p-2 hover:bg-gray-100 rounded-full transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>

  </nav>

  <!-- Page Content -->
  <router-outlet></router-outlet>

</div>
